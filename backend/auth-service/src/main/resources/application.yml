server:
  port: 8086

spring:
  application:
    name: auth-service

  # 数据源配置
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/redteam_file?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: postgres
    password: postgres
    type: com.alibaba.druid.pool.DruidDataSource
    druid:
      initial-size: 5
      min-idle: 10
      max-active: 50

  # Redis配置
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 10000ms

# MyBatis Plus配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.redteam.auth.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

# Knife4j配置
knife4j:
  enable: true
  setting:
    language: zh_cn

# 日志配置
logging:
  level:
    root: info
    com.redteam: debug

# 安全配置
security:
  jwt:
    secret: redteam-file-platform-secret-key-for-jwt-token-generation-2024
    expiration: 86400000
    token-prefix: Bearer
    header-name: Authorization
  ignore-urls:
    - /auth/login
    - /auth/register
    - /auth/captcha
    - /doc.html
    - /swagger-resources/**
    - /v3/api-docs/**
    - /webjars/**
