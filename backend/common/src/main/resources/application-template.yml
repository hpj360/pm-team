# ==========================================
# 网络安全红方文件汇聚平台 - 核心配置模板
# ==========================================

spring:
  application:
    name: file-platform-service

  # ========== 数据源配置 ==========
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/redteam_file?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: postgres
    password: postgres
    type: com.alibaba.druid.pool.DruidDataSource
    druid:
      # 初始连接数
      initial-size: 5
      # 最小连接池数量
      min-idle: 10
      # 最大连接池数量
      max-active: 50
      # 配置获取连接等待超时的时间
      max-wait: 60000
      # 配置连接超时时间
      connect-timeout: 30000
      # 配置网络超时时间
      socket-timeout: 60000
      # 配置间隔多久才进行一次检测，检测需要关闭的空闲连接，单位是毫秒
      time-between-eviction-runs-millis: 60000
      # 配置一个连接在池中最小生存的时间，单位是毫秒
      min-evictable-idle-time-millis: 300000
      # 配置一个连接在池中最大生存的时间，单位是毫秒
      max-evictable-idle-time-millis: 900000
      # 配置检测连接是否有效
      validation-query: SELECT 1
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
      # 打开PSCache，并且指定每个连接上PSCache的大小
      pool-prepared-statements: true
      max-pool-prepared-statement-per-connection-size: 20
      # 配置监控统计拦截的filters
      filters: stat,wall
      # 开启监控页面
      stat-view-servlet:
        enabled: true
        url-pattern: /druid/*
        login-username: admin
        login-password: admin
      # Web监控配置
      web-stat-filter:
        enabled: true
        url-pattern: /*
        exclusions: "*.js,*.gif,*.jpg,*.png,*.css,*.ico,/druid/*"

  # ========== Redis 配置 ==========
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      timeout: 10000ms
      lettuce:
        pool:
          # 连接池最大连接数
          max-active: 200
          # 连接池最大阻塞等待时间
          max-wait: -1ms
          # 连接池中的最大空闲连接
          max-idle: 10
          # 连接池中的最小空闲连接
          min-idle: 0

  # ========== Kafka 配置 ==========
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      # 发生错误后，消息重发的次数
      retries: 3
      # 当有多个消息需要被发送到同一个分区时，生产者会把它们放在同一个批次里
      batch-size: 16384
      # 生产者内存缓冲区的大小
      buffer-memory: 33554432
      # key序列化
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      # value序列化
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      # acks=0：生产者不会等待服务器的响应
      # acks=1：只要集群的首领节点收到消息，生产者就会收到一个来自服务器成功响应
      # acks=all：只有当所有参与复制的节点全部收到消息时，生产者才会收到一个来自服务器的成功响应
      acks: all
    consumer:
      # 自动提交的时间间隔
      auto-commit-interval: 100ms
      # 当Kafka中没有初始偏移量或服务器上不存在当前偏移量时该怎么办
      auto-offset-reset: earliest
      # 是否自动提交偏移量
      enable-auto-commit: false
      # key反序列化
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      # value反序列化
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    listener:
      # 在侦听器容器中运行的线程数
      concurrency: 5
      # 手动提交模式
      ack-mode: manual

  # ========== 文件上传配置 ==========
  servlet:
    multipart:
      # 是否启用文件上传
      enabled: true
      # 单个文件最大大小
      max-file-size: 500MB
      # 总上传的最大文件大小
      max-request-size: 1GB

  # ========== Jackson 配置 ==========
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

# ========== MyBatis Plus 配置 ==========
mybatis-plus:
  # Mapper XML 文件位置
  mapper-locations: classpath*:/mapper/**/*.xml
  # 实体类扫描路径
  type-aliases-package: com.redteam.*.entity
  configuration:
    # 开启驼峰命名转换
    map-underscore-to-camel-case: true
    # 日志输出
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      # 主键类型
      id-type: assign_id
      # 逻辑删除字段
      logic-delete-field: deleted
      # 逻辑删除值
      logic-delete-value: 1
      # 逻辑未删除值
      logic-not-delete-value: 0

# ========== MinIO 配置 ==========
minio:
  endpoint: http://localhost:9000
  access-key: minioadmin
  secret-key: minioadmin
  bucket-name: redteam-files
  # 预签名URL过期时间（秒）
  presigned-expiry: 3600

# ========== Elasticsearch 配置 ==========
elasticsearch:
  hosts: localhost:9200
  username: elastic
  password: elastic123
  # 连接超时时间
  connection-timeout: 5000
  # Socket超时时间
  socket-timeout: 30000

# ========== Milvus 向量数据库配置 ==========
milvus:
  host: localhost
  port: 19530
  database: default
  # 向量维度
  vector-dimension: 768
  # 索引类型
  index-type: IVF_FLAT
  # 相似度度量类型
  metric-type: L2

# ========== Redisson 配置 ==========
redisson:
  # 单节点配置
  single-server-config:
    address: redis://localhost:6379
    database: 0
    connection-pool-size: 64
    connection-minimum-idle-size: 10
    idle-connection-timeout: 10000
    connect-timeout: 10000
    timeout: 3000

# ========== Dubbo 配置 ==========
dubbo:
  application:
    name: ${spring.application.name}
    logger: slf4j
  protocol:
    name: dubbo
    port: -1
  registry:
    address: nacos://localhost:8848
    parameters:
      namespace: redteam
  consumer:
    # 启动时检查依赖的服务是否可用
    check: false
    # 超时时间
    timeout: 5000
    # 重试次数
    retries: 2

# ========== Spring Cloud 配置 ==========
cloud:
  nacos:
    discovery:
      server-addr: localhost:8848
      namespace: redteam
      group: DEFAULT_GROUP
    config:
      server-addr: localhost:8848
      namespace: redteam
      group: DEFAULT_GROUP
      file-extension: yaml

# ========== Knife4j API文档配置 ==========
knife4j:
  enable: true
  setting:
    language: zh_cn
    swagger-model-name: 实体类列表

# ========== 日志配置 ==========
logging:
  level:
    root: info
    com.redteam: debug
    org.springframework.web: info
    org.springframework.security: info
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n"
  file:
    name: logs/${spring.application.name}.log
    max-size: 100MB
    max-history: 30

# ========== 服务配置 ==========
server:
  port: 8080
  servlet:
    context-path: /api
  tomcat:
    uri-encoding: UTF-8
    max-threads: 200
    accept-count: 100

# ========== 安全配置 ==========
security:
  jwt:
    # JWT密钥（生产环境应使用环境变量）
    secret: redteam-file-platform-secret-key-for-jwt-token-generation-2024
    # Token过期时间（毫秒）- 24小时
    expiration: 86400000
    # Token前缀
    token-prefix: Bearer
    # Token请求头名称
    header-name: Authorization

  # 忽略认证的路径
  ignore-urls:
    - /auth/login
    - /auth/register
    - /auth/captcha
    - /doc.html
    - /swagger-resources/**
    - /v3/api-docs/**
    - /webjars/**
    - /druid/**
